<!DOCTYPE html>
<html>
<head>
    <title>Coffee Catch Quest</title>
    <style>
        body { margin: 0; text-align: center; background: #2c3e50; font-family: sans-serif; overflow: hidden; }
        canvas { background: #ecf0f1; display: block; margin: 20px auto; border: 5px solid #95a5a6; border-radius: 10px; cursor: none; }
        h1 { color: white; margin-top: 10px; }
        .ui { color: white; font-size: 20px; }
    </style>
</head>
<body>

    <h1>☕ COFFEE CATCHER ☕</h1>
    <div class="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <p class="ui">Move your mouse/finger to catch the coffee!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        let score = 0;
        let gameState = "start";
        let coffeeX = Math.random() * 370;
        let coffeeY = 0;
        let coffeeSpeed = 3;
        let playerX = 175;

        // Track Mouse Movement
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            playerX = e.clientX - rect.left - 25;
        });

        // Track Touch (for phones)
        canvas.addEventListener("touchmove", (e) => {
            const rect = canvas.getBoundingClientRect();
            playerX = e.touches[0].clientX - rect.left - 25;
            e.preventDefault();
        }, { passive: false });

        // Click to start / restart
        canvas.addEventListener("click", () => {
            if (gameState === "start" || gameState === "gameover") {
                score = 0;
                scoreElement.innerText = score;
                coffeeSpeed = 3;
                resetCoffee();
                gameState = "playing";
                draw();
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === "start") {
                ctx.fillStyle = "black";
                ctx.font = "30px Arial";
                ctx.fillText("CLICK TO START", 90, 220);
                ctx.font = "18px Arial";
                ctx.fillText("Catch coffee... don't miss 😵", 85, 260);
                return;
            }

            if (gameState === "gameover") {
                ctx.fillStyle = "red";
                ctx.font = "30px Arial";
                ctx.fillText("GAME OVER", 110, 220);
                ctx.font = "18px Arial";
                ctx.fillText("Click to restart", 120, 260);
                return;
            }

            // Draw coffee
            ctx.font = "40px Arial";
            ctx.fillText("☕", coffeeX, coffeeY);

            // Draw catcher
            ctx.font = "50px Arial";
            ctx.fillText("🖐️", playerX, 480);

            // Move the coffee
            coffeeY += coffeeSpeed;

            // Check for Catch
            if (coffeeY > 440 && coffeeY < 480 && coffeeX > playerX - 20 && coffeeX < playerX + 40) {
                score++;
                scoreElement.innerText = score;
                resetCoffee();
                coffeeSpeed += 0.2;
            }

            // Check if coffee hit the floor
            if (coffeeY > 500) {
                gameState = "gameover";
                draw();
                return;
            }

            requestAnimationFrame(draw);
        }

        function resetCoffee() {
            coffeeY = 0;
            coffeeX = Math.random() * (canvas.width - 40);
        }

        draw();
    </script>
</body>
</html>
