<!DOCTYPE html>
<html>
<head>
    <title>My First Game</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; padding-top: 100px; }
        .game-card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        #score { font-size: 48px; font-weight: bold; color: #2ea44f; }
        button { font-size: 20px; padding: 15px 30px; cursor: pointer; background-color: #2ea44f; color: white; border: none; border-radius: 5px; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>Clicker Quest</h1>
        <p>Score:</p>
        <div id="score">0</div>
        <br>
        <button onclick="addPoint()">CLICK ME!</button>
    </div>

    <script>
        let count = 0;
        function addPoint() {
            count = count + 1;
            document.getElementById("score").innerText = count;
        }
    </script>

</body>
</html>
